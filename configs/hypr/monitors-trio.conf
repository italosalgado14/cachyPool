# ============================================================
# "TRIO" monitor profile — both 16" portables + laptop, laptop in the middle
# ============================================================
# Layout left-to-right:
#   1. FHD portable 16"  1920x1080@60  ("demoset" EDID)   (left)
#   2. eDP-1 laptop built-in 2560x1600@240                (center)
#   3. QHD portable 16"  2560x1600@120                    (right)
#
# This is an ALTERNATE profile. It is NOT sourced by hyprland.conf.
# Apply it live with:  ~/.config/hypr/scripts/monitor-mode.sh trio
# The autoswitcher picks it whenever two externals are connected and one of
# them is the demoset FHD. Super+M toggles trio <-> read on the road.
#
# NOTE: the DP-* names below reflect one plug order (QHD on DP-1, FHD on
# DP-2) and may be swapped on another day. monitor-mode.sh trio does not use
# this file — it identifies the panels by capability (the QHD is whichever
# external can do 2560x1600), so prefer the script over sourcing this file.
# If no QHD-capable external is connected (e.g. demoset + a hotel TV), the
# script falls back to a generic layout: laptop left, externals to its right
# at their preferred modes.

# FHD portable (left) — native 1080p60, scale 1
monitor = DP-2, 1920x1080@60, 0x0, 1

# Laptop built-in (center) — 240Hz, scaled +25% (2048 logical wide)
monitor = eDP-1, 2560x1600@240, 1920x0, 1.25

# QHD portable (right) — 120Hz, scaled +25%
monitor = DP-1, 2560x1600@120, 3968x0, 1.25

# Workspaces — monitors.conf binds by name (1-3: DP-1, 4-5: eDP-1, 6-9: DP-2),
# so with this plug order ws 1-3 land on the QHD (right), 4-5 on the laptop
# (center), 6-9 on the FHD (left).
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:eDP-1, default:true
workspace = 5, monitor:eDP-1
workspace = 6, monitor:DP-2, default:true
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2
