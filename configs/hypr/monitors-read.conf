# ============================================================
# "READ" monitor profile — portrait middle screen for reading
# ============================================================
# Layout left-to-right:
#   1. DP-1  Samsung FHD          (leftmost)
#   2. DP-2  portable QHD 16"     (center, rotated 270° = portrait)
#   3. eDP-1 laptop built-in      (rightmost)
#
# This is an ALTERNATE profile. It is NOT sourced by hyprland.conf.
# Apply it live with:  ~/.config/hypr/scripts/monitor-mode.sh read
# or toggle with Super+M. The default 3-across layout lives in monitors.conf.

# Samsung FHD (left) — PRIMARY, native, scale 1
monitor = DP-1, 1920x1080@120, 0x0, 1

# Portable QHD 16" (center) — rotated 270° → 1280x2048 logical, for reading
monitor = DP-2, 2560x1600@120, 1920x0, 1.25, transform, 3

# Laptop built-in (right) — 240Hz, scaled +25%
monitor = eDP-1, 2560x1600@240, 3200x0, 1.25

# Workspaces — names unchanged, so the same WS→monitor map applies
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:eDP-1, default:true
workspace = 5, monitor:eDP-1
workspace = 6, monitor:DP-2, default:true
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2
