# ============================================================
# "READ" monitor profile — portrait right screen for reading, laptop OFF
# ============================================================
# Layout left-to-right:
#   1. left external, landscape  (Xiaomi 27" 4K at the desk; demoset FHD on road)
#   2. portable QHD 16"          (right, rotated 270° = portrait)
#   eDP-1 laptop built-in is POWERED OFF in this profile.
#
# This is an ALTERNATE profile. It is NOT sourced by hyprland.conf.
# Apply it live with:  ~/.config/hypr/scripts/monitor-mode.sh read
# or toggle with Super+M. The default 3-across layout lives in monitors.conf.
# The script version resolves panels by capability (QHD = whichever external
# does 2560x1600) rather than by the DP-* names below, so it also works on the
# road: demoset FHD landscape left + QHD portrait right, laptop off.

# Left external (landscape) — PRIMARY. The geometry below is the historical
# Samsung FHD example; monitor-mode.sh drives the live panel instead — the Xiaomi
# 27" 4K runs at 3840x2160@60 → 3072x1728 (scale 1.25) at the desk.
monitor = DP-1, 1920x1080@120, 0x0, 1

# Portable QHD 16" (right) — rotated 270° → 1280x2048 logical, for reading
monitor = DP-2, 2560x1600@120, 1920x0, 1.25, transform, 3

# Laptop built-in — OFF in read mode
monitor = eDP-1, disable

# Workspaces — eDP-1 is off, so its workspaces (4–5) move onto DP-1 here
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-2, default:true
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2
