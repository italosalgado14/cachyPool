# GPU / Wayland env
# VA-API: 2026-07-02 rerouted from the NVIDIA shim (libva-nvidia-driver) to the
# Intel iGPU's iHD driver — the compositor and all three monitors run on the
# iGPU, and the dGPU's GSP often dies after suspend/resume, so routing video
# decode at the dGPU only produced NVRM error spam. NVD_BACKEND=direct (a
# shim-only knob) was dropped with it. See ACTUAL-CONFIGURATION.md §15 and
# finish-installation-commands.md §12 (incl. why Firefox additionally has
# hardware decode paused in user.js until the i915 7.0.12 bug is fixed).
# NOTE: `env =` only reaches processes Hyprland spawns (keybinds/exec-once).
# Walker/Elephant launches apps from the systemd --user manager, which never
# sees these vars — use per-app config when a setting must reach those.
env = LIBVA_DRIVER_NAME,iHD

# NVIDIA dGPU (offload-only — see §15 "Compositor renders on the Intel iGPU"
# before changing these)
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm

# Wayland toolkit hints
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = MOZ_ENABLE_WAYLAND,1

# Cursor & theme
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct

cursor {
    no_hardware_cursors = true
}
