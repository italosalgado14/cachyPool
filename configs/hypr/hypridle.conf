general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

listener {
    timeout = 300                          # 5 min
    on-timeout = loginctl lock-session     # lock screen
}

listener {
    timeout = 600                          # 10 min
    on-timeout = hyprctl dispatch dpms off # screen off
    on-resume  = hyprctl dispatch dpms on
}

listener {
    timeout = 1200                         # 20 min
    # Suspend only on battery (BAT1 "Discharging" covers barrel AC, USB-C PD and dock power).
    # On AC the machine stays awake: resume from long s2idle crashes nvidia_modeset
    # (GSP boot failure 0x62 -> kernel oops, black screen) — incident 2026-07-12, see
    # ACTUAL-CONFIGURATION.md §15.
    on-timeout = grep -q Discharging /sys/class/power_supply/BAT1/status && systemctl suspend
}
