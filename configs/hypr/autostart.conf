exec-once = waybar
exec-once = mako
exec-once = hyprpaper
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent.service
# swayosd-server runs as a systemd --user unit (Restart=always) rather than a
# bare exec-once: swayosd 0.3.1 aborts whenever the monitor set changes (the
# 'read' profile disabling eDP-1, or any hotplug), and a bare exec-once never
# comes back — which kills the volume/brightness OSD and the media keys. The
# unit auto-restarts it. See ~/.config/systemd/user/swayosd.service (mirrored in
# configs/systemd/user/). monitor-mode.sh also restarts it after each switch.
exec-once = systemctl --user start swayosd.service
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = nm-applet --indicator
# Elephant is Walker's backend hub. Its user unit is WantedBy=graphical-session.target,
# but this getty-autologin + start-hyprland session never activates that target, so it
# must be started explicitly here (same pattern as hyprpolkitagent above). Without this,
# Walker hangs on "Waiting for elephant" because no elephant.sock is ever created.
exec-once = systemctl --user start elephant.service
exec-once = walker --gapplication-service

# Auto-select monitor layout from what's connected: both externals (DP-1+DP-2)
# -> 'read'; no externals -> 'laptop' (integrated only). 'desktop' is never
# auto-applied (manual via Super+M). Long-lived: listens to Hyprland's .socket2
# for monitor hotplug events. (See scripts/monitor-autoswitch.sh.)
exec-once = ~/.config/hypr/scripts/monitor-autoswitch.sh
