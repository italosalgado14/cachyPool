exec-once = waybar
exec-once = mako
exec-once = hyprpaper
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent.service
exec-once = swayosd-server
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = nm-applet --indicator
# Elephant is Walker's backend hub. Its user unit is WantedBy=graphical-session.target,
# but this getty-autologin + start-hyprland session never activates that target, so it
# must be started explicitly here (same pattern as hyprpolkitagent above). Without this,
# Walker hangs on "Waiting for elephant" because no elephant.sock is ever created.
exec-once = systemctl --user start elephant.service
exec-once = walker --gapplication-service
