# Window rules (Hyprland 0.53+ syntax)
# Format: windowrule = match:<field> <value>, <effect> on

# Float common dialog/utility windows
windowrule = match:class pavucontrol, float on
windowrule = match:class nm-connection-editor, float on
windowrule = match:class blueman-manager, float on
windowrule = match:class .blueman-manager-wrapped, float on
windowrule = match:class file-roller, float on

# Picture-in-Picture (browser video popouts)
windowrule = match:title Picture-in-Picture, float on
windowrule = match:title Picture-in-Picture, pin on
windowrule = match:title Picture-in-Picture, size 480 270

# Authentication dialogs
windowrule = match:class hyprpolkitagent, float on
windowrule = match:class polkit-kde-authentication-agent-1, float on

# File pickers / dialogs
windowrule = match:class xdg-desktop-portal-gtk, float on

# System tools
windowrule = match:class org.gnome.Calculator, float on

# Shortcuts cheatsheet popup (show-shortcuts.sh / Walker "Shortcuts" entry)
windowrule = match:class shortcuts-cheatsheet, float on
windowrule = match:class shortcuts-cheatsheet, size 880 780
windowrule = match:class shortcuts-cheatsheet, center on

# Tile-by-default workspaces 1-9 (no-op, just here as a template you can extend)
