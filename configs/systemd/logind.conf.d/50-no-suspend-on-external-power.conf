# Lid close on external power (AC / USB-C PD / dock) must NOT suspend:
# resume from long s2idle crashes nvidia_modeset (GSP boot failure 0x62 ->
# kernel oops -> black screen) — incident 2026-07-12, ACTUAL-CONFIGURATION.md §15.
# On battery the default (suspend) still applies; docked = ignore (default).
# Live copy: /etc/systemd/logind.conf.d/50-no-suspend-on-external-power.conf
[Login]
HandleLidSwitchExternalPower=ignore
